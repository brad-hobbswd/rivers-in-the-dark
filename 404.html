<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lost in the Dark</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
background:
linear-gradient(rgba(4,17,29,.78),rgba(4,17,29,.92)),
url("images/rivers-cover.jpg");
background-size:cover;
background-position:center;
font-family:Poppins,sans-serif;
color:#f4f4f4;
text-align:center;
}

.card{
max-width:700px;
padding:50px 35px;
background:rgba(5,16,28,.82);
backdrop-filter:blur(8px);
border:1px solid rgba(214,169,72,.25);
border-radius:30px;
}

.error{
font-size:6rem;
font-family:"Cormorant Garamond",serif;
color:#d6a948;
line-height:1;
margin-bottom:10px;
}

h1{
font-family:"Cormorant Garamond",serif;
font-size:3rem;
margin-bottom:25px;
}

p{
line-height:1.9;
margin-bottom:20px;
color:#e0e0e0;
}

.quote{
font-style:italic;
color:#d6a948;
margin:30px 0;
}

.btn{
display:inline-block;
padding:14px 30px;
background:#d6a948;
color:#04111d;
text-decoration:none;
border-radius:40px;
font-weight:600;
margin-top:15px;
}

</style>

</head>
<body>

<div class="card">

<div class="error">
404
</div>

<h1>
Lost in the Dark
</h1>

<p>
A wrong turn happened somewhere along the river.
</p>

<p>
The page you searched for drifted into the night and could not be found.
</p>

<div class="quote">

"Even rivers that disappear beneath the surface eventually find the way forward."

</div>

<p>
No worries. Every journey deserves another path.
</p>

<a href="index.html" class="btn">
Return Home
</a>

</div>

</body>
</html>
